workflows:
  build-android:
    name: Build Android APK
    instance_type: linux_vm
    max_number_of_parallel_deliveries: 1
    
    environment:
      flutter: stable
      xcode: latest
      
    caching:
      cache_paths:
        - pub-cache
        - $HOME/.gradle/caches
        
    scripts:
      - name: Get Flutter version
        script: flutter --version
        
      - name: Clean previous builds
        script: flutter clean
        
      - name: Install dependencies
        script: flutter pub get
        
      - name: Analyze code
        script: flutter analyze
        
      - name: Run tests
        script: flutter test
        
      - name: Build Android APK (Release)
        script: flutter build apk --release --obfuscate --split-debug-info=build/app/outputs/symbols
        
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
      
    publishing:
      slack:
        channel: '#builds'
        notify_on_build_start: true
        notify:
          success: true
          failure: true
