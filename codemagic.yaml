build-android:
    name: Build Android APK - Unique Theme Launcher
    instance_type: linux_vm
    max_number_of_parallel_deliveries: 1
    
    environment:
      flutter: stable
    
    caching:
      cache_paths:
        - pub-cache
        - $HOME/.gradle/caches
    
    scripts:
      - name: Get Flutter version
        script: flutter --version
      
      - name: Clean previous builds
        script: flutter clean
      
      - name: Install dependencies
        script: flutter pub get
      
      - name: Generate JSON serialization
        script: flutter pub run build_runner build --delete-conflicting-outputs
      
      - name: Build Android APK
        script: flutter build apk --release
    
    artifacts:
      - build/app/outputs/flutter-apk/**.apk